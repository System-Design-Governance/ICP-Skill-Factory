  site_code: "OVW"
  rev: "1.0"
  date: "2026-03-23"
  standard: "IEC 62443 / IEC 61850 / Purdue Model"
  zone_labels:
    l4: "Level 4｜External Systems"
    dmz: "DMZ｜Fortinet Security Fabric"
    l3: "Level 3｜SCADA + Management"
    l2: "Level 2｜Network Infrastructure"
    l1: "Level 1｜Bay Control + RTU"
    l0: "Level 0｜Field Devices + Sensors"

scada:
