  PRP_LAN_A:
    label: "PRP LAN-A  IEC 62439-3"
    stroke: "#008EC3"
    stroke_width: 2
    stroke_dash: 0
  PRP_LAN_B:
    label: "PRP LAN-B  IEC 62439-3"
    stroke: "#0C3467"
    stroke_width: 2
    stroke_dash: 0
  OPC_UA_A:
    label: "IEC 61850 MMS  LAN-A"
