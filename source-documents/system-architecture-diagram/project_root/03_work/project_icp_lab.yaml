    stroke_dash: 3
  OPC_UA_B:
    label: "IEC 61850 MMS  LAN-B"
    stroke: "#0C3467"
    stroke_width: 2
    stroke_dash: 3
  IEEE1588_A:
    label: "SNTP / PTPv2  LAN-A"
