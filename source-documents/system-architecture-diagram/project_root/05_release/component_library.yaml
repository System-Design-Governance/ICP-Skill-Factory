# ============================================================
# OT 架構圖元件庫 — component_library.yaml
# 版本：v2.0  |  2026-03-04
# 維護說明：見 OT_Architecture_Framework_v1.0.md §3.5
# 必填欄位：id / category / vendor / model / display_name / d2_class / protocols
# ============================================================
# 分層對照：
#   L4 (Enterprise)   → category: IT_SWITCH / IT_FIREWALL / ERP_SERVER
#   DMZ               → category: FIREWALL / DATA_DIODE / VPN_ROUTER
#   L3 (Supervisory)  → category: HMI / HISTORIAN / SCADA_SERVER / NTP_SERVER / ENG_WS / UPS_L3
#   L2 (Control Net)  → category: SWITCH_PRP / SWITCH_MANAGED / REDBOX
#   L1 (Field Ctrl)   → category: GATEWAY / RTU / PLC / STATCOM_CTRL
#   L0 (Field Dev)    → category: IED_PROTECTION / METER / INVERTER / UPS_FIELD / PMU
# ============================================================

components:

