field_devices:
  protection_ieds:
    enabled: false
  pmcc_ieds:
    enabled: false
  solar_storage:
    enabled: true
    group_label: "IP Cameras (PoE, 4K)"
    devices:
      - id: "CAM_YARD"
        label: "PTZ Camera × 4\nONS Yard Perimeter"
        type: "plc"
        comm: "IT_ethernet"
        connected_to: "rtu_ONS"
      - id: "CAM_TR"
        label: "Fixed Camera × 4\nTransformer Area"
        type: "plc"
        comm: "IT_ethernet"
        connected_to: "rtu_ONS"
      - id: "CAM_CTRL"
        label: "Dome Camera × 3\nControl Room / Entry"
        type: "plc"
        comm: "IT_ethernet"
        connected_to: "rtu_ONS"
      - id: "CAM_GIS"
        label: "Fixed Camera × 3\nGIS Hall"
        type: "plc"
        comm: "IT_ethernet"
        connected_to: "rtu_ONS"
      - id: "CAM_SWST"
        label: "PTZ Camera × 4\nOnSWST Yard"
        type: "plc"
        comm: "IT_ethernet"
        connected_to: "rtu_SWST"
      - id: "CAM_SWST2"
        label: "Fixed Camera × 2\nOnSWST Building"
        type: "plc"
        comm: "IT_ethernet"
        connected_to: "rtu_SWST"

