      label: "ONS"
      description: "ONS Building + Yard"
      mcc_panels: ""
    - id: "SWST"
      label: "OnSWST"
      description: "Switching Station"
      mcc_panels: ""

field_control:
  gateways:
    enabled: false
  rtu_panels:
