      rtu_model: "NVR  H.265  8MP"
      redbox: false
      ieds: []
      connected_to_feeder: "ONS"
    - id: "SWST"
      label: "NVR-2 (OnSWST, 64ch)"
      node_label: "NVR"
      rtu_model: "NVR  H.265  8MP"
      redbox: false
      ieds: []
      connected_to_feeder: "SWST"
